    const prompt=`Parse Bali villa cost report for "${S.addVilla}", month ${S.addMonth}. Revenue=col D gross. young_commission=15% gross. pr_fee=255000. water_tank=trucking only. maintenance_oneoff=repairs>500k. Exclude credit reversals. Local tax into other. Extract one-off items into oneoff_items sorted desc. Return ONLY JSON: {"revenue":0,"costs":{"management":0,"young_commission":0,"pr_fee":0,"electricity":0,"laundry":0,"amenities":0,"staff":0,"cleaning":0,"maintenance_oneoff":0,"ac":0,"water_tank":0,"other":0,"badung_tax":0,"withholding_tax":0},"oneoff_items":[{"desc":"","amt":0}],"anomalies":[],"note":""}\nReport:\n${raw.slice(0,8000)}`;
    try{
      const d=await callAI({model:"claude-sonnet-4-6",max_tokens:1200,messages:[{role:"user",content:prompt}]});
      const txt=d.content?.find(b=>b.type==="text")?.text||"{}";
      ss({parseResult:JSON.parse(txt.replace(/```json|```/g,"").trim()),parseLoading:false});
    }catch(e){ss({parseResult:{error:"Parse failed: "+e.message},parseLoading:false})}
  }

  const modeOpts=[["upload","Upload file"],["text","Paste text"]];
  const manualCard=E("div",{className:"card"},[
    E("p",{style:{fontWeight:"500",fontSize:"14px",marginBottom:"12px"}},["Or add data manually"]),
    E("div",{style:{display:"flex",gap:"12px",flexWrap:"wrap",marginBottom:"1rem"}},[
      E("div",{},[E("p",{className:"label"},["Villa"]),E("select",{onChange:e=>ss({addVilla:e.target.value})},VILLAS.map(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;if(v===S.addVilla)o.selected=true;return o}))]),
      E("div",{},[E("p",{className:"label"},["Month"]),E("input",{type:"month",value:S.addMonth,style:{width:"150px"},onChange:e=>ss({addMonth:e.target.value})})]),
      E("div",{},[E("p",{className:"label"},["Source"]),E("select",{onChange:e=>ss({addMode:e.target.value})},modeOpts.map(([v,l])=>{const o=document.createElement("option");o.value=v;o.textContent=l;if(v===S.addMode)o.selected=true;return o}))])
    ]),
    S.addMode==="upload"?E("div",{},[E("p",{style:{fontSize:"12px",color:"var(--text2)",marginBottom:"8px"}},["Upload cost sheet or Young revenue report."]),E("input",{type:"file",accept:".csv,.txt,.xlsx,.xls",style:{fontSize:"12px"},onChange:async e=>{const f=e.target.files[0];if(!f)return;const t=await f.text();ss({addRaw:t});parseContent(t)}})]):null,
    S.addMode==="text"?E("div",{},[E("textarea",{placeholder:"Paste report text…",style:{minHeight:"120px"},onInput:e=>ss({addRaw:e.target.value})},[S.addRaw||""]),E("button",{onClick:()=>parseContent(S.addRaw),disabled:!isConfigured||S.parseLoading||!S.addRaw.trim(),style:{marginTop:"8px"}},[S.parseLoading?"Parsing…":"↗ Parse with AI"])]):null
  ]);

  let parsed=null;
  if(S.parseLoading){parsed=E("div",{className:"card",style:{color:"var(--text2)",fontSize:"13px"}},["AI is reading the report…"]);}
  else if(S.parseResult&&!S.parseResult.error){
    const pr=S.parseResult;const totC=totalCosts(pr.costs||{});const payout=(pr.revenue||0)-totC;
    const oneoffPreview=pr.oneoff_items?.length?[E("p",{className:"sec"},["One-off breakdown"]),...pr.oneoff_items.map(i=>E("div",{className:"cost-row"},[E("span",{className:"cost-label"},[i.desc]),E("span",{},[fmtM(i.amt)])]))]:[];
    parsed=E("div",{className:"card"},[
      E("p",{className:"sec",style:{marginTop:"0"}},["Preview — "+S.addVilla+" "+S.addMonth]),
      pr.anomalies?.length?E("div",{className:"anomaly-box"},[E("p",{style:{fontSize:"12px",fontWeight:"500",color:"#92400e",margin:"0 0 4px"}},["⚠ Anomalies"]),...pr.anomalies.map(a=>E("p",{style:{fontSize:"12px",color:"#92400e",margin:"2px 0"}},[a]))]):null,
      E("div",{className:"grid4"},[metric("Gross revenue",fmtM(pr.revenue||0)),metric("Total costs",fmtM(totC)),metric("Owner payout",fmtM(payout))]),
      E("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 16px",marginBottom:"12px"}},COST_CATS.map(k=>{const v=pr.costs?.[k]||0;if(!v)return null;return E("div",{className:"cost-row"},[E("span",{className:"cost-label"},[CAT_LABELS[k]]),E("span",{},[fmtM(v)])])}).filter(Boolean)),
      ...oneoffPreview,
      pr.note?E("p",{style:{fontSize:"12px",color:"var(--text2)",margin:"8px 0"}},[pr.note]):null,
      E("div",{style:{display:"flex",gap:"8px",marginTop:"12px"}},[
        E("button",{onClick:()=>{
          const h={...S.history};if(!h[S.addMonth])h[S.addMonth]={};const ex=h[S.addMonth][S.addVilla]||{};
          h[S.addMonth][S.addVilla]={revenue:(pr.revenue||0)>0?(pr.revenue||0):(ex.revenue||0),costs:pr.costs||{},note:pr.note||"",oneoff_items:pr.oneoff_items||ex.oneoff_items||[]};
          saveHistory(h);ss({parseResult:null,addRaw:"",syncStatus:{}});alert("Saved "+S.addVilla+" — "+S.addMonth);
        },style:{fontWeight:"500"}},["✓ Save to portfolio"]),
        E("button",{onClick:()=>ss({parseResult:null,addRaw:""}),style:{color:"var(--text2)"}},["Discard"])
      ])
    ].filter(Boolean));
  }else if(S.parseResult?.error){parsed=E("div",{className:"card",style:{color:"#b91c1c",fontSize:"13px"}},[S.parseResult.error]);}

  return E("div",{},[warning,E("div",{className:"card"},[E("p",{style:{fontWeight:"500",fontSize:"14px",marginBottom:"12px"}},["↗ Pull from live cost sheets"]),E("p",{style:{fontSize:"12px",color:"var(--text2)",marginBottom:"12px"}},["Reads from Google Sheets. Click ⚙ Source to update file IDs."]),monthPicker,...syncCards]),manualCard,parsed].filter(Boolean));
}

function render(){
  const root=document.getElementById("app");
  if(S.loading){root.innerHTML="<div style='padding:2rem;color:var(--text2)'>Loading…</div>";return}
  const panels=[renderSummary,renderTrends,renderROI,renderInsights,renderAddData];
  const tabBar=E("div",{className:"tab-bar"},TABS.map((t,i)=>
    E("button",{className:"tab"+(S.tab===i?" active":""),onClick:()=>{S.tab=i;render();if(i===1)waitForChartThenDraw();}},[t])
  ));
  const panel=(panels[S.tab]||renderSummary)();
  root.innerHTML="";
  root.appendChild(E("div",{},[renderHero(),tabBar,panel]));
}

init();
</script>

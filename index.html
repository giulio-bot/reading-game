  :root{
    --peach:#FFE9D6;--sky:#C8EFFF;--gold:#FFC93C;--green:#5EC26A;--coral:#FF8E72;
    --purple:#B57EDC;--ink:#4A3B2A;--ink-soft:#8a7a66;--card:#FFFFFF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Fredoka',system-ui,sans-serif;color:var(--ink);
    background:linear-gradient(180deg,var(--peach) 0%, #FFF3E6 38%, var(--sky) 100%);
    overflow:hidden;-webkit-user-select:none;user-select:none;
  }
  #app{height:100%;display:flex;flex-direction:column;}

  .tools{position:fixed;top:14px;right:14px;display:flex;gap:8px;z-index:30;}
  .tool-btn{
    width:46px;height:46px;border:none;border-radius:50%;background:rgba(255,255,255,.7);
    backdrop-filter:blur(4px);font-size:22px;cursor:pointer;display:flex;align-items:center;
    justify-content:center;box-shadow:0 3px 8px rgba(74,59,42,.12);transition:transform .15s;
  }
  .tool-btn:active{transform:scale(.9);}

  /* name screen */
  .screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
  .mascot{font-size:92px;line-height:1;animation:bob 3s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-14px) rotate(3deg);}}
  .langtoggle{display:inline-flex;background:rgba(255,255,255,.6);border-radius:999px;padding:5px;margin:16px 0 6px;box-shadow:0 3px 8px rgba(74,59,42,.1);}
  .lang{font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;border:none;background:transparent;color:var(--ink-soft);padding:9px 20px;border-radius:999px;cursor:pointer;transition:all .2s;}
  .lang.on{background:#fff;color:var(--ink);box-shadow:0 2px 6px rgba(74,59,42,.12);}
  .ask{font-size:clamp(26px,5vw,40px);font-weight:700;margin:14px 0 6px;}
  .sub{color:var(--ink-soft);font-size:clamp(15px,3vw,19px);margin-bottom:24px;font-weight:500;}
  #nameInput{
    font-family:'Fredoka',sans-serif;font-size:30px;font-weight:600;text-align:center;
    padding:16px 22px;border:4px solid #ffd9b0;border-radius:22px;outline:none;
    width:min(320px,82vw);background:#fff;color:var(--ink);box-shadow:0 6px 0 #ffd9b0;
  }
  #nameInput:focus{border-color:var(--gold);box-shadow:0 6px 0 var(--gold);}
  .go-btn{
    margin-top:26px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:26px;color:#fff;
    background:var(--green);border:none;border-radius:24px;padding:16px 44px;cursor:pointer;
    box-shadow:0 7px 0 #44a350;transition:transform .12s, box-shadow .12s;
  }
  .go-btn:active{transform:translateY(5px);box-shadow:0 2px 0 #44a350;}
  .go-btn:disabled{opacity:.45;box-shadow:0 7px 0 #b9b2a6;cursor:not-allowed;}

  /* game screen */
  #game{display:none;flex:1;flex-direction:column;}
  .greet{text-align:center;font-weight:600;font-size:clamp(20px,4vw,28px);padding:18px 16px 4px;}
  .greet b{color:var(--purple);}
  .starbar{display:flex;gap:10px;justify-content:center;align-items:center;padding:6px 0 2px;}
  .slot{font-size:34px;filter:grayscale(1) opacity(.28);transition:transform .25s, filter .25s;}
  .slot.full{filter:none;animation:pop .45s cubic-bezier(.2,1.4,.4,1);}
  @keyframes pop{0%{transform:scale(.2) rotate(-30deg);}70%{transform:scale(1.35) rotate(8deg);}100%{transform:scale(1);}}
  .prize-hint{text-align:center;color:var(--ink-soft);font-size:13px;font-weight:500;margin-top:2px;min-height:18px;}

  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:6px 16px;min-height:0;}
  .pic-card{
    position:relative;cursor:pointer;
    background:var(--card);border-radius:34px;padding:min(5vh,40px) min(8vw,56px);
    box-shadow:0 12px 30px rgba(74,59,42,.14), inset 0 0 0 5px #fff7ee;
    display:flex;align-items:center;justify-content:center;min-width:160px;min-height:120px;
    transition:transform .12s;
  }
  .pic-card:active{transform:scale(.97);}
  .pic-card.silent{cursor:default;}
  .pic-card.silent:active{transform:none;}
  .speaker{
    position:absolute;top:-12px;right:-12px;width:54px;height:54px;border-radius:50%;
    background:var(--gold);border:4px solid #fff;display:flex;align-items:center;justify-content:center;
    font-size:25px;box-shadow:0 4px 10px rgba(74,59,42,.22);animation:pulse 1.9s ease-in-out infinite;pointer-events:none;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.13);}}
  .pic{font-size:min(24vh,140px);line-height:1;animation:float 3.4s ease-in-out infinite;}
  .pic.word{font-family:'Andika',sans-serif;font-size:min(15vh,84px);letter-spacing:1px;color:var(--ink);animation:none;text-transform:none;font-weight:700;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .prompt{font-weight:600;color:var(--ink-soft);font-size:clamp(15px,3.4vw,20px);}

  .options{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding:6px 14px max(22px,env(safe-area-inset-bottom));}
  .tile{
    font-family:'Andika',sans-serif;text-transform:none;font-weight:700;
    font-size:clamp(30px,7vw,46px);letter-spacing:1px;color:var(--ink);
    background:#fff;border:4px solid #ffe2c2;border-radius:26px;

    margin-top:24px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:26px;color:#fff;background:var(--purple);

  .modetoggle{display:inline-flex;background:rgba(255,255,255,.6);border-radius:999px;padding:5px;margin:4px 0 2px;box-shadow:0 3px 8px rgba(74,59,42,.1);}

  .guide{stroke:#e7ddcf;stroke-width:1.2;}

  .arrow{fill:var(--gold);}

  .wbtn{font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;border:none;border-radius:20px;padding:13px 30px;cursor:pointer;transition:transform .12s,box-shadow .12s;}
  .wbtn.clear{background:#fff;color:var(--ink-soft);box-shadow:0 6px 0 #e8dcc8;}

  .wbtn.done:active{transform:translateY(4px);box-shadow:0 2px 0 #44a350;}
  .wbtn:disabled{opacity:.4;box-shadow:0 6px 0 #cfc3ad;cursor:not-allowed;}

    prizes:[['🦄','un unicorno'],['⚽','una palla'],['🧸','un orsetto'],['🚗','una macchinina'],['🍦','un gelato'],['🎈','un palloncino'],['🍭','un lecca-lecca'],['🌈','un arcobaleno'],['🦋','una farfalla'],['🧁','un dolcetto'],['👑','una corona'],['🌸','un fiore'],['🐱','un gattino'],['🪁','un aquilone'],['🦕','un dinosauro'],['🍩','una ciambella']]
  }
};

/* ---------------- state ---------------- */
let lang='en', T=DATA.en.t, LV=DATA.en.levels, PZ=DATA.en.prizes;
let name='', stars=0, totalCorrect=0, levelIndex=0, roundCount=0, mode='word';
let current=null, lastWord='', prizeIdx=0, busy=false, muted=false;
let gameMode='read', drawing=false, hasInk=false, currentWord='', levelMsgUntil=0, curMode='word', oopsT=null, deck=[], deckLevel=-1;
let pendingPrize=false, pendingBoss=false, seenCorrect=[], bossSlots=[], bossActive=0, bossWordPair=null;
const BOSS_EVERY=10;
const STARS_PER_PRIZE=5, CORRECT_PER_LEVEL=10;

/* ---------------- sound ---------------- */
let ac=null;
function audio(){ if(!ac){ try{ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(ac&&ac.state==='suspended')ac.resume(); return ac; }
function tone(freq,start,dur,type='sine',vol=.18){
  const c=audio(); if(!c||muted)return;
  const o=c.createOscillator(), g=c.createGain(); o.type=type; o.frequency.value=freq;
  const t=c.currentTime+start;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+dur+.05);
}
const sndRight=()=>{[523,659,784].forEach((f,i)=>tone(f,i*.09,.18,'triangle',.16));};
const sndWrong=()=>tone(196,0,.25,'sine',.14);
const sndStar=()=>tone(880,0,.16,'triangle',.14);
const sndFanfare=()=>{[523,659,784,1047,1319].forEach((f,i)=>tone(f,i*.12,.3,'triangle',.16));};

/* ---------------- speech (on-device, offline) ---------------- */
const SPEECH = !!window.speechSynthesis;
let voices=[];
function loadVoices(){ try{ voices = speechSynthesis.getVoices() || []; }catch(e){ voices=[]; } }
if(SPEECH){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function pickVoice(){
  const pref = lang==='it' ? ['it-it','it'] : ['en-gb','en-us','en'];
  for(const p of pref){ const v=voices.find(v=>(v.lang||'').toLowerCase().startsWith(p)); if(v)return v; }
  return null;
}
function speak(text,rate){
  if(muted || !SPEECH || !text) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang = lang==='it' ? 'it-IT' : 'en-GB';
    const v=pickVoice(); if(v)u.voice=v;
    u.rate=rate||0.6; u.pitch=1.1;
    setTimeout(()=>{ try{ speechSynthesis.speak(u); }catch(e){} }, 80); // settle after cancel so rate sticks
  }catch(e){}
}

/* ---------------- helpers ---------------- */
const $=id=>document.getElementById(id);
const rand=a=>a[Math.floor(Math.random()*a.length)];
const cap=s=>s? s[0].toUpperCase()+s.slice(1):s;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------------- language ---------------- */
function setLang(l){
  lang=l; T=DATA[l].t; LV=DATA[l].levels; PZ=DATA[l].prizes;
  document.querySelectorAll('.lang').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  $('ask').textContent=T.ask; $('sub').textContent=T.sub; $('goBtn').textContent=T.go;
  document.querySelectorAll('.modebtn').forEach(b=>{ b.textContent = b.dataset.mode==='read'?T.modeRead : b.dataset.mode==='write'?T.modeWrite : T.modeBoth; });
  $('clearBtn').textContent=T.clear; $('doneBtn').textContent=T.done;
}
document.querySelectorAll('.lang').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
document.querySelectorAll('.modebtn').forEach(b=>b.addEventListener('click',()=>{
  gameMode=b.dataset.mode;
  document.querySelectorAll('.modebtn').forEach(x=>x.classList.toggle('on',x===b));
}));

/* ---------------- name screen ---------------- */
$('nameInput').addEventListener('input',e=>{ $('goBtn').disabled=e.target.value.trim().length===0; });
$('nameInput').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!$('goBtn').disabled)startGame(); });
$('goBtn').addEventListener('click',startGame);

function startGame(){
  audio();
  if(SPEECH){ try{ const u=new SpeechSynthesisUtterance(' '); u.volume=0; speechSynthesis.speak(u); }catch(e){} } // unlock voice in-gesture
  name=cap($('nameInput').value.trim()||T.fallbackName);
  stars=0; totalCorrect=0; levelIndex=0; prizeIdx=0; roundCount=0; levelMsgUntil=0; deck=[]; deckLevel=-1; current=null;
  pendingPrize=false; pendingBoss=false; seenCorrect=[]; bossWordPair=null;
  $('greet').innerHTML=T.greet(name);
  $('prizeHint').textContent=T.hint;
  $('winText').innerHTML=T.win;
  $('yayBtn').textContent=T.yay;
  $('nameScreen').style.display='none';
  $('game').style.display='flex';
  renderStars(); nextRound();
}

/* ---------------- round dispatcher (read / write / both) ---------------- */
function drawWord(){
  // shuffled "deck" per level: no word repeats until the whole level is used up
  if(deckLevel!==levelIndex || deck.length===0){
    deck=shuffle(LV[levelIndex].words.slice()); deckLevel=levelIndex;
    if(deck.length>1 && deck[0][0]===lastWord){ deck.push(deck.shift()); }
  }
  const w=deck.shift(); lastWord=w[0]; return w;
}
function nextRound(){
  busy=false; roundCount++;
  let type;
  if(gameMode==='write') type='write';
  else if(gameMode==='both'){
    if(roundCount%2===1){ const cyc=(roundCount+1)/2; type=(cyc%2===1)?'read-word':'read-image'; }
    else type='write';
  }
  else type=(roundCount%2===1)?'read-word':'read-image';

  if(type==='write'){
    const w=(gameMode==='both' && current)?current:drawWord();
    current=w; lastWord=w[0]; showWrite(w);
  } else {
    setupRead(type==='read-image'?'image':'word');
  }
}
function setupRead(readMode){
  curMode=readMode;
  $('writePanel').style.display='none'; $('bossPanel').style.display='none';
  $('readPanel').style.display='flex';
  if(Date.now()>levelMsgUntil) $('prizeHint').textContent=T.hint;
  current=drawWord();
  const pic=$('pic');
  if(readMode==='word'){ pic.classList.remove('word'); pic.textContent=current[1]; $('prompt').textContent=T.pickWord; }
  else { pic.classList.add('word'); pic.textContent=current[0]; $('prompt').textContent=T.pickImage; }
  $('speaker').style.display=(readMode==='word' && SPEECH)?'flex':'none';
  $('picCard').classList.toggle('silent', readMode!=='word');
  renderOptions();
}
function renderOptions(){
  const pool=LV[levelIndex].words;
  const distract=shuffle(pool.filter(w=>w[0]!==current[0])).slice(0,2);
  const opts=shuffle([current,...distract]);
  const box=$('options'); box.innerHTML='';
  opts.forEach(([word,emoji])=>{
    const b=document.createElement('button');
    if(curMode==='word'){ b.className='tile'; b.textContent=word; }
    else { b.className='tile img'; b.textContent=emoji; b.setAttribute('aria-label',word); }
    b.addEventListener('click',()=>pickAnswer(b,word));
    box.appendChild(b);
  });
}

function pickAnswer(btn,word){
  if(busy)return;
  if(word===current[0]){
    busy=true; btn.classList.add('correct'); sndRight(); speak(current[0]);
    totalCorrect++; addStar(); recordCorrect(current);
    pendingPrize = stars>=STARS_PER_PRIZE;
    pendingBoss = (totalCorrect % BOSS_EVERY === 0);
    setTimeout(advance,650);
  } else {
    busy=true; btn.classList.add('wrong'); sndWrong(); removeStar(); showOops();
    setTimeout(()=>{ busy=false; renderOptions(); },780); // fresh, reshuffled choices — must re-read
  }
}
const OOPS=['🙈','😟','😬','🤭'];
function showOops(){
  $('oopsFace').textContent=rand(OOPS);
  const o=$('oops'), f=$('oopsFace');
  o.style.display='flex'; f.style.animation='none'; void f.offsetWidth; f.style.animation='';
  clearTimeout(oopsT); oopsT=setTimeout(()=>{ o.style.display='none'; },820);
}

/* ---------------- stars ---------------- */
function renderStars(){
  const bar=$('starbar'); bar.innerHTML='';
  for(let i=0;i<STARS_PER_PRIZE;i++){ const s=document.createElement('span'); s.className='slot'+(i<stars?' full':''); s.textContent='⭐'; bar.appendChild(s); }
}
function addStar(){ if(stars<STARS_PER_PRIZE)stars++; const sl=$('starbar').children; if(sl[stars-1])sl[stars-1].classList.add('full'); sndStar(); }
function removeStar(){ if(stars>0)stars--; const sl=$('starbar').children; if(sl[stars])sl[stars].classList.remove('full'); }
function maybeLevelUp(){
  const target=(levelIndex+1)*CORRECT_PER_LEVEL;
  if(totalCorrect>=target && levelIndex<LV.length-1){
    levelIndex++;
    $('prizeHint').textContent=T.levelUp; levelMsgUntil=Date.now()+2600;
    setTimeout(()=>{ if(Date.now()>=levelMsgUntil-60) $('prizeHint').textContent=baseHint(); },2600);
  }
}

/* ---------------- celebration ---------------- */
function celebrate(){
  const [emoji,pname]=PZ[prizeIdx % PZ.length]; prizeIdx++;
  $('prizeEmoji').textContent=emoji; $('prizeName').textContent=pname;
  $('celebrate').style.display='flex'; sndFanfare(); startConfetti(2200);
  setTimeout(()=>speak(T.wonSpoken(pname),0.85),650);
}
$('yayBtn').addEventListener('click',()=>{
  $('celebrate').style.display='none'; stars=0; renderStars(); advance();
});

/* ---------------- progress flow: prize -> boss -> level-up -> next ---------------- */
function recordCorrect(pair){
  if(!pair)return;
  if(!seenCorrect.some(p=>p[0]===pair[0])) seenCorrect.push(pair.slice());
  if(seenCorrect.length>40) seenCorrect.shift();
}
function advance(){
  if(pendingPrize){ pendingPrize=false; celebrate(); return; }
  if(pendingBoss){ pendingBoss=false; startBoss(); return; }
  maybeLevelUp(); nextRound();
}

/* ---------------- boss level: spell the word from letter tiles ---------------- */
function startBoss(){
  const lvWords=new Set(LV[levelIndex].words.map(w=>w[0]));
  let pool=seenCorrect.filter(p=>lvWords.has(p[0]));
  if(!pool.length) pool=seenCorrect.slice();
  if(!pool.length) pool=[drawWord()];
  bossWordPair=rand(pool);
  const chars=[...bossWordPair[0]];
  const prefill = chars.length>=5 ? 2 : 1;
  bossSlots = chars.map((c,i)=>({char:c, filled:i<prefill}));
  bossActive = prefill;
  const needed = chars.slice(prefill);
  const distractCount = chars.length>=5 ? 2 : (chars.length===4?1:0);
  const inWord=new Set(chars);
  const avail=shuffle('abcdefghijklmnopqrstuvwxyz'.split('').filter(l=>!inWord.has(l)));
  const tiles=shuffle(needed.concat(avail.slice(0,distractCount))).map((c,i)=>({id:i,char:c,used:false}));
  $('readPanel').style.display='none'; $('writePanel').style.display='none'; $('bossPanel').style.display='flex';
  $('prizeHint').textContent=T.bossHint;
  $('bossPic').textContent=bossWordPair[1];
  $('bossSpk').style.display=SPEECH?'flex':'none';
  renderBossSlots();
  const box=$('bossLetters'); box.innerHTML='';
  tiles.forEach(t=>{
    const b=document.createElement('button'); b.className='ltile'; b.textContent=t.char;
    b.addEventListener('click',()=>pickLetter(t,b));
    box.appendChild(b);
  });
  busy=false;
}
function renderBossSlots(){
  const box=$('bossSlots'); box.innerHTML='';
  bossSlots.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='slot-box'+(s.filled?' done':'')+(i===bossActive?' active':'');
    d.textContent=s.filled?s.char:'';
    box.appendChild(d);
  });
}
function pickLetter(t,b){
  if(busy||t.used||bossActive>=bossSlots.length)return;
  if(t.char===bossSlots[bossActive].char){
    t.used=true; b.classList.add('used'); b.disabled=true;
    bossSlots[bossActive].filled=true; bossActive++;
    sndStar(); renderBossSlots();
    if(bossActive>=bossSlots.length){ busy=true; setTimeout(bossWin,450); }
  } else {
    sndWrong(); showOops(); b.classList.add('shake'); setTimeout(()=>b.classList.remove('shake'),420);
  }
}
function bossWin(){
  speak(bossWordPair[0],0.5);
  $('bossWinTitle').textContent=T.bossTitle;
  $('bossWinWord').textContent=bossWordPair[0];
  $('bossNext').textContent=T.bossNext;
  $('bossWin').style.display='flex'; sndFanfare(); startConfetti(2600);
}
$('bossPicWrap').addEventListener('click',()=>{ audio(); if(bossWordPair)speak(bossWordPair[0]); });
$('bossNext').addEventListener('click',()=>{
  $('bossWin').style.display='none'; $('bossPanel').style.display='none'; advance();
});

/* ---------------- confetti ---------------- */
const cv=$('confetti'), cx=cv.getContext('2d');
let parts=[], confTimer=null, raf=null;
function sizeCanvas(){ cv.width=innerWidth; cv.height=innerHeight; }
addEventListener('resize',sizeCanvas); sizeCanvas();
function startConfetti(ms){
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cols=['#FFC93C','#B57EDC','#5EC26A','#FF8E72','#65C7FF','#FF6FA5'];
  const n=reduce?40:160; parts=[];
  for(let i=0;i<n;i++)parts.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.5,r:6+Math.random()*8,c:rand(cols),vy:2+Math.random()*4,vx:-2+Math.random()*4,rot:Math.random()*6,vr:-.2+Math.random()*.4});
  cv.style.display='block'; if(raf)cancelAnimationFrame(raf); drawConfetti();
  clearTimeout(confTimer); confTimer=setTimeout(()=>{ cv.style.display='none'; if(raf)cancelAnimationFrame(raf); parts=[]; },ms);
}
function drawConfetti(){
  cx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr; cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillStyle=p.c;cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);cx.restore(); });
  raf=requestAnimationFrame(drawConfetti);
}

/* ---------------- writing / tracing ---------------- */
const ink=$('inkCanvas'), ictx=ink.getContext('2d');
const SVGNS='http://www.w3.org/2000/svg';
const baseHint=()=> gameMode==='write' ? T.traceHint : T.hint;

function buildTrace(word){
  const wrapR=$('traceSvgWrap'), wrapM=$('markSvgWrap');
  wrapR.innerHTML=''; wrapM.innerHTML='';
  const placed=[]; let totalW=0;
  [...word.toLowerCase()].forEach(c=>{ const g=GLYPHS[c]; if(g){ placed.push({g,x:totalW}); totalW+=g.w; } });
  totalW=Math.max(totalW,40); const H=140;
  // --- bottom layer: guide lines + grey ghost roads ---
  const svg=document.createElementNS(SVGNS,'svg'); svg.setAttribute('viewBox',`0 0 ${totalW} ${H}`);
  const line=(y,cls)=>{const l=document.createElementNS(SVGNS,'line');l.setAttribute('x1',0);l.setAttribute('x2',totalW);l.setAttribute('y1',y);l.setAttribute('y2',y);l.setAttribute('class','guide'+(cls?' '+cls:''));svg.appendChild(l);};
  line(45,'dash'); line(100,'');
  placed.forEach(({g,x})=>{
    const grp=document.createElementNS(SVGNS,'g'); grp.setAttribute('transform',`translate(${x},0)`);
    g.s.forEach(d=>{ const p=document.createElementNS(SVGNS,'path'); p.setAttribute('d',d); p.setAttribute('class','road'); grp.appendChild(p); });
    (g.dots||[]).forEach(([dx,dy,r])=>{ const c=document.createElementNS(SVGNS,'circle'); c.setAttribute('cx',dx);c.setAttribute('cy',dy);c.setAttribute('r',r);c.setAttribute('class','gdot'); grp.appendChild(c); });
    svg.appendChild(grp);
  });
  wrapR.appendChild(svg); // attach before measuring
  // --- top layer: start dots + arrows + numbers (always visible above the ink) ---
  const msvg=document.createElementNS(SVGNS,'svg'); msvg.setAttribute('viewBox',`0 0 ${totalW} ${H}`);
  placed.forEach(({g,x})=>{
    g.s.forEach((d,i)=>{
      const tmp=document.createElementNS(SVGNS,'path'); tmp.setAttribute('d',d); tmp.setAttribute('visibility','hidden'); svg.appendChild(tmp);
      const L=tmp.getTotalLength(), p0=tmp.getPointAtLength(0);
      const aAt=Math.min(L*0.22,L), a0=tmp.getPointAtLength(aAt), a1=tmp.getPointAtLength(Math.min(aAt+6,L));
      svg.removeChild(tmp);
      const dot=document.createElementNS(SVGNS,'circle'); dot.setAttribute('cx',x+p0.x); dot.setAttribute('cy',p0.y); dot.setAttribute('r',6.5); dot.setAttribute('class','startdot'); msvg.appendChild(dot);
      if(g.s.length>1){ const t=document.createElementNS(SVGNS,'text'); t.setAttribute('x',x+p0.x-12); t.setAttribute('y',p0.y-9); t.setAttribute('class','snum'); t.textContent=(i+1); msvg.appendChild(t); }
      const ang=Math.atan2(a1.y-a0.y,a1.x-a0.x), sz=8.5, px=x+a0.x, py=a0.y;
      const pt=(o,m)=>`${(px+Math.cos(ang+o)*m).toFixed(1)},${(py+Math.sin(ang+o)*m).toFixed(1)}`;
      const tri=document.createElementNS(SVGNS,'polygon'); tri.setAttribute('points',`${pt(0,sz)} ${pt(2.5,sz)} ${pt(-2.5,sz)}`); tri.setAttribute('class','arrow'); msvg.appendChild(tri);
    });
  });
  wrapM.appendChild(msvg);
  requestAnimationFrame(sizeInk);
}
function sizeInk(){
  const r=ink.getBoundingClientRect(); const dpr=Math.min(window.devicePixelRatio||1,2);
  ink.width=Math.round(r.width*dpr); ink.height=Math.round(r.height*dpr);
  ictx.setTransform(dpr,0,0,dpr,0,0); ictx.lineCap='round'; ictx.lineJoin='round'; ictx.lineWidth=15;
  ictx.strokeStyle=(getComputedStyle(document.documentElement).getPropertyValue('--purple').trim())||'#B57EDC';
}
function clearInk(){ ictx.save(); ictx.setTransform(1,0,0,1,0,0); ictx.clearRect(0,0,ink.width,ink.height); ictx.restore(); }

function showWrite(pair){
  currentWord=pair[0];
  $('readPanel').style.display='none'; $('bossPanel').style.display='none'; $('writePanel').style.display='flex';
  $('wpPic').textContent=pair[1];
  if(Date.now()>levelMsgUntil) $('prizeHint').textContent=T.traceHint;
  buildTrace(pair[0]); clearInk(); hasInk=false; $('doneBtn').disabled=true;
}

function inkPos(e){ const r=ink.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
ink.addEventListener('pointerdown',e=>{ if($('writePanel').style.display==='none')return; drawing=true; try{ink.setPointerCapture(e.pointerId);}catch(_){} const p=inkPos(e); ictx.beginPath(); ictx.moveTo(p.x,p.y); ictx.lineTo(p.x+0.1,p.y+0.1); ictx.stroke(); e.preventDefault(); },{passive:false});
ink.addEventListener('pointermove',e=>{ if(!drawing)return; const p=inkPos(e); ictx.lineTo(p.x,p.y); ictx.stroke(); if(!hasInk){ hasInk=true; $('doneBtn').disabled=false; } e.preventDefault(); },{passive:false});
function endDraw(){ drawing=false; }
ink.addEventListener('pointerup',endDraw); ink.addEventListener('pointercancel',endDraw);

$('clearBtn').addEventListener('click',()=>{ clearInk(); hasInk=false; $('doneBtn').disabled=true; });
$('doneBtn').addEventListener('click',()=>{
  if(busy||!hasInk)return; busy=true;
  sndRight(); totalCorrect++; addStar(); recordCorrect(current);
  pendingPrize = stars>=STARS_PER_PRIZE;
  pendingBoss = (totalCorrect % BOSS_EVERY === 0);
  if(!pendingPrize) speak(currentWord,0.55);   // say the finished word, nice and slow
  setTimeout(advance,650);
});
$('writeHint').addEventListener('click',()=>{ audio(); if(currentWord)speak(currentWord); });
addEventListener('resize',()=>{ if($('writePanel').style.display!=='none'){ sizeInk(); clearInk(); hasInk=false; $('doneBtn').disabled=true; } });

/* ---------------- tools ---------------- */
$('muteBtn').addEventListener('click',()=>{ muted=!muted; $('muteBtn').textContent=muted?'🔇':'🔊'; if(muted&&SPEECH){try{speechSynthesis.cancel();}catch(e){}} if(!muted)sndStar(); });
$('picCard').addEventListener('click',()=>{ if($('picCard').classList.contains('silent'))return; audio(); if(current)speak(current[0]); });
if(!SPEECH){ document.querySelectorAll('#speaker, .wp-spk').forEach(el=>el.style.display='none'); }
$('homeBtn').addEventListener('click',()=>{
  $('celebrate').style.display='none'; $('bossWin').style.display='none'; $('game').style.display='none'; $('nameScreen').style.display='flex';
  $('nameInput').value=''; $('goBtn').disabled=true; $('nameInput').focus();
});

setLang('en');
window.addEventListener('load',()=>$('nameInput').focus());
</script>
